<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" width="192" height="192">
  <!--
    Pixel Eco Logo — 8×8 砖块图案
    主题色 #d84b4b，错缝砌砖，左上光照
    高光 #e48181 → 基色 #d84b4b → 过渡 #c43a3a → 阴影 #7e1b1b
  -->

  <!-- Brick 1: rows 0-1, cols 0-5 -->
  <rect x="0" y="0" width="1" height="1" fill="#e48181"/>
  <rect x="1" y="0" width="1" height="1" fill="#e48181"/>
  <rect x="2" y="0" width="1" height="1" fill="#e48181"/>
  <rect x="3" y="0" width="1" height="1" fill="#e48181"/>
  <rect x="4" y="0" width="1" height="1" fill="#e48181"/>
  <rect x="5" y="0" width="1" height="1" fill="#c43a3a"/>
  <rect x="0" y="1" width="1" height="1" fill="#d84b4b"/>
  <rect x="1" y="1" width="1" height="1" fill="#d84b4b"/>
  <rect x="2" y="1" width="1" height="1" fill="#d84b4b"/>
  <rect x="3" y="1" width="1" height="1" fill="#d84b4b"/>
  <rect x="4" y="1" width="1" height="1" fill="#d84b4b"/>
  <rect x="5" y="1" width="1" height="1" fill="#7e1b1b"/>

  <!-- Brick 2: rows 3-4, cols 2-7 -->
  <rect x="2" y="3" width="1" height="1" fill="#e48181"/>
  <rect x="3" y="3" width="1" height="1" fill="#e48181"/>
  <rect x="4" y="3" width="1" height="1" fill="#e48181"/>
  <rect x="5" y="3" width="1" height="1" fill="#e48181"/>
  <rect x="6" y="3" width="1" height="1" fill="#e48181"/>
  <rect x="7" y="3" width="1" height="1" fill="#c43a3a"/>
  <rect x="2" y="4" width="1" height="1" fill="#d84b4b"/>
  <rect x="3" y="4" width="1" height="1" fill="#d84b4b"/>
  <rect x="4" y="4" width="1" height="1" fill="#d84b4b"/>
  <rect x="5" y="4" width="1" height="1" fill="#d84b4b"/>
  <rect x="6" y="4" width="1" height="1" fill="#d84b4b"/>
  <rect x="7" y="4" width="1" height="1" fill="#7e1b1b"/>

  <!-- Brick 3: rows 6-7, cols 0-5 -->
  <rect x="0" y="6" width="1" height="1" fill="#e48181"/>
  <rect x="1" y="6" width="1" height="1" fill="#e48181"/>
  <rect x="2" y="6" width="1" height="1" fill="#e48181"/>
  <rect x="3" y="6" width="1" height="1" fill="#e48181"/>
  <rect x="4" y="6" width="1" height="1" fill="#e48181"/>
  <rect x="5" y="6" width="1" height="1" fill="#c43a3a"/>
  <rect x="0" y="7" width="1" height="1" fill="#d84b4b"/>
  <rect x="1" y="7" width="1" height="1" fill="#d84b4b"/>
  <rect x="2" y="7" width="1" height="1" fill="#d84b4b"/>
  <rect x="3" y="7" width="1" height="1" fill="#d84b4b"/>
  <rect x="4" y="7" width="1" height="1" fill="#d84b4b"/>
  <rect x="5" y="7" width="1" height="1" fill="#7e1b1b"/>
</svg>
